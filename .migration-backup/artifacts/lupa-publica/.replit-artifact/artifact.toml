kind = "web"
previewPath = "/"
title = "LUPA Digital"
version = "1.0.0"
id = "artifacts/lupa-publica"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24059

[services.development]
run = "pnpm --filter @workspace/lupa-publica run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lupa-publica", "run", "build" ]
serve = "static"
publicDir = "artifacts/lupa-publica/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24059"
BASE_PATH = "/"
